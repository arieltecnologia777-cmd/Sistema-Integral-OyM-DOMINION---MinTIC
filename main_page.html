<!-- ===== Scripts: Tema + Sidebar + Fit Legal + Modales + Carrusel + Logout + Bienvenida ===== -->
  <script>
  /* ========== Tema (Claro/Oscuro) ========== */
  (function(){
    const themeKey = 'landing_theme';
    const docEl = document.documentElement;
    const body = document.body;
    const btn = document.getElementById('btnTheme');
    const lbl = document.getElementById('btnThemeText');
    const applyLabel = (mode)=>{ if (lbl) lbl.textContent = 'Tema: ' + (mode === 'dark' ? 'Oscuro' : 'Claro'); };
    function setMode(mode){
      docEl.setAttribute('data-theme', mode);
      body.classList.toggle('theme-dark', mode==='dark');
      localStorage.setItem(themeKey, mode);
      applyLabel(mode);
    }
    (function initTheme(){
      const saved = localStorage.getItem(themeKey);
      const initial = saved || docEl.getAttribute('data-theme') || 'light';
      setMode(initial);
    })();
    btn?.addEventListener('click', () => {
      const current = (docEl.getAttribute('data-theme')==='dark') ? 'dark' : 'light';
      const next = (current==='dark') ? 'light' : 'dark';
      setMode(next);
      if (typeof fitLegal === 'function') setTimeout(fitLegal, 0);
    });
  })();

  /* ========== Sidebar móvil (hamburguesa) ========== */
  (function(){
    const btnMenu = document.getElementById('btnMenu');
    btnMenu?.addEventListener('click', ()=>{
      document.body.classList.toggle('sb-open');
      setTimeout(()=>{ if (typeof fitLegal==='function') fitLegal(); }, 260);
    });
  })();

  /* ========== Auto-fit del texto legal (posición y escala correctas) ========== */
  function fitLegal(){
    const legal = document.getElementById('heroLegal');
    const col = document.querySelector('.text-side');
    if(!legal || !col) return;
    legal.style.transform = 'translateX(-50%) scale(1)';
    const cs = getComputedStyle(col);
    const padL = parseFloat(cs.paddingLeft) || 0;
    const padR = parseFloat(cs.paddingRight) || 0;
    const available = col.clientWidth - padL - padR - 6;
    const needed = legal.scrollWidth;
    let scale = 1;
    if (needed > available) scale = available / needed;
    legal.style.transformOrigin = 'bottom center';
    legal.style.transform = `translateX(-50%) scale(${Math.min(1, Math.max(0.7, scale))})`;
  }
  window.addEventListener('load', fitLegal);
  window.addEventListener('resize', fitLegal);
  window.addEventListener('orientationchange', () => setTimeout(fitLegal, 200));

  /* ========== Controlador genérico de modales (Ayuda / Selector / Pwd) ========== */
  function makeModal(backdropId, initialFocusId){
    const backdrop = document.getElementById(backdropId);
    if (!backdrop) return {open:()=>{}, close:()=>{}};
    let lastFocused = null;
    function open(){
      lastFocused = document.activeElement;
      backdrop.classList.add('open');
      backdrop.removeAttribute('aria-hidden');
      if (initialFocusId) setTimeout(()=> document.getElementById(initialFocusId)?.focus?.(), 10);
    }
    function close(){
      backdrop.classList.remove('open');
      backdrop.setAttribute('aria-hidden','true');
      lastFocused?.focus?.();
    }
    backdrop.addEventListener('click', (ev)=>{ if (ev.target === backdrop) close(); });
    document.addEventListener('keydown', (ev)=>{ if (backdrop.classList.contains('open') && ev.key === 'Escape') close(); });
    return {open, close};
  }

  // Modal Ayuda
  (function(){
    const help = makeModal('helpBackdrop', 'helpTitle');
    document.getElementById('btnAyuda')?.addEventListener('click', (e)=>{ e.preventDefault(); help.open(); });
    document.getElementById('helpClose')?.addEventListener('click', help.close);
    document.getElementById('helpBackdropClose')?.addEventListener('click', help.close);
  })();

  // ===== Selector Módulo de exclusiones (SIEMPRE se muestra al volver) =====
  (function(){
    const selector = makeModal('exclusionesBackdrop', 'exclusionesTitle');
    const btnOpen = document.getElementById('btnModuloExclusiones');
    btnOpen?.addEventListener('click', (e)=>{
      e.preventDefault();
      // Restaurar backdrops si quedaron ocultos tras un acceso anterior
      const pwdBack = document.getElementById('pwdBackdrop');
      const selBack = document.getElementById('exclusionesBackdrop');
      if (pwdBack) pwdBack.style.display = '';
      if (selBack) selBack.style.display = '';
      selector.open();
    });
    document.getElementById('exclusionesClose')?.addEventListener('click', selector.close);
    document.getElementById('exclusionesBackdropClose')?.addEventListener('click', selector.close);
    // Utilitario para cerrar selector desde fuera
    window.__closeSelectorIfOpen = function(){
      const back = document.getElementById('exclusionesBackdrop');
      if (back && back.classList.contains('open')){
        back.classList.remove('open');
        back.setAttribute('aria-hidden','true');
      }
    };
  })();

  // ===== Modal de contraseña (estilizado) + navegaciòn y recuerdo del módulo =====
  (function(){
    const modal = makeModal('pwdBackdrop', 'pwdTitle');
    const $pwdInput = document.getElementById('pwdInput');
    const $pwdToggle = document.getElementById('pwdToggle');
    const $pwdCancel = document.getElementById('pwdCancel');
    const $pwdClose = document.getElementById('pwdClose');
    const $pwdConfirm = document.getElementById('pwdConfirm');
    const $pwdRoleInfo = document.getElementById('pwdRoleInfo');
    let currentRole = null; // 'admin' | 'gestor'

    function labelForRole(role){ return role === 'admin' ? 'Módulo Admin' : 'Módulo Gestor'; }
    function openPwd(role){
      currentRole = role;
      if ($pwdRoleInfo){
        $pwdRoleInfo.innerHTML = `Ingresa la contraseña para <strong>${labelForRole(role)}</strong>.`;
      }
      if ($pwdInput){
        $pwdInput.type = 'password';
        $pwdInput.value = '';
        setTimeout(()=> $pwdInput.focus(), 30);
      }
      modal.open();
    }
    function closePwd(){ modal.close(); }

    /* ================================================================
       BLOQUE DE ACCESO (Admin / Gestor)
       ————> PUNTO OFICIAL PARA CAMBIAR CONTRASEÑAS POR REGIONAL <————
       Si necesitas modificar las claves de acceso de R1/R2, hazlo aquí.
       ================================================================= */
    const ACCESS_PASSWORDS = {
      // Admin (sin cambios)
      admin: 'adm1nroot#',

      // ======== GESTOR POR REGIONAL ========
      // Clave para entrar al Gestor con scope R1:
      gestor_R1: 'R1admin#',
      // Clave para entrar al Gestor con scope R2:
      gestor_R2: 'R2-admin#'
    };

    // Destinos (conserva tus rutas actuales)
    const TARGET_URLS = {
      admin: 'admin_exclusiones.html',
      gestor: 'http://arieltecnologia777-cmd.github.io/Sistema-Integral-OyM-DOMINION-MinTIC/gestor_exclusiones.html'
    };

    function confirmPwd(){
      const val = ($pwdInput?.value ?? '').trim();
      if (!currentRole) return;

      // ---- Admin (sin cambios)
      if (currentRole === 'admin') {
        if (val !== ACCESS_PASSWORDS.admin) {
          alert('No tienes permiso para ingresar al módulo Admin.');
          $pwdInput?.focus(); $pwdInput?.select();
          return;
        }
        sessionStorage.setItem('last_module', 'admin');
        closePwd(); window.__closeSelectorIfOpen?.();
        const pwdBack = document.getElementById('pwdBackdrop');
        const selBack = document.getElementById('exclusionesBackdrop');
        if (pwdBack) pwdBack.style.display = 'none';
        if (selBack) selBack.style.display = 'none';
        window.open(TARGET_URLS.admin, '_blank', 'noopener,noreferrer');
        return;
      }

      // ---- Gestor con 2 contraseñas -> scope R1 / R2
      if (currentRole === 'gestor') {
        let scope = null;

        if (val === ACCESS_PASSWORDS.gestor_R1) scope = 'R1';
        else if (val === ACCESS_PASSWORDS.gestor_R2) scope = 'R2';

        if (!scope) {
          alert('No tienes permiso para ingresar al Módulo Gestor.\nVerifica la contraseña por regional.');
          $pwdInput?.focus(); $pwdInput?.select();
          return;
        }

        sessionStorage.setItem('last_module', 'gestor');
        closePwd(); window.__closeSelectorIfOpen?.();
        const pwdBack = document.getElementById('pwdBackdrop');
        const selBack = document.getElementById('exclusionesBackdrop');
        if (pwdBack) pwdBack.style.display = 'none';
        if (selBack) selBack.style.display = 'none';

        // Abrir Gestor pasando el scope en la URL (R1 | R2)
        const url = `${TARGET_URLS.gestor}?scope=${encodeURIComponent(scope)}`;
        window.open(url, '_blank', 'noopener,noreferrer');
        return;
      }

      alert('Rol desconocido.');
    }

    // Toggle mostrar/ocultar contraseña
    $pwdToggle?.addEventListener('click', ()=>{
      if (!$pwdInput) return;
      $pwdInput.type = ($pwdInput.type === 'password') ? 'text' : 'password';
      $pwdInput.focus();
    });

    // Wire botones del selector
    document.getElementById('btnAccessAdmin')?.addEventListener('click', ()=> openPwd('admin'));
    document.getElementById('btnAccessGestor')?.addEventListener('click', ()=> openPwd('gestor'));

    // Wire controles del modal
    $pwdCancel?.addEventListener('click', closePwd);
    $pwdClose ?.addEventListener('click', closePwd);
    $pwdConfirm?.addEventListener('click', confirmPwd);
    $pwdInput ?.addEventListener('keydown', (ev)=>{ if (ev.key === 'Enter') confirmPwd(); });

    // Exponer para usos futuros si hiciera falta
    window.__openPwd = openPwd;
  })();

  /* ========== Carrusel: crossfade + blur, autoplay 7s, fondo blur dinámico (original) ========== */
  (function(){
    const track = document.getElementById('cTrack');
    const prev = document.getElementById('cPrev');
    const next = document.getElementById('cNext');
    if (!track) return;
    const MAX_TRY = 40;
    const AUTOPLAY_MS = 7000;
    const okName = (i)=> `miniatura${i}.jpg`;
    const typoName = (i)=> `minuatira${i}.jpg`;
    function probe(src){
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve({exists:true, src});
        img.onerror = () => resolve({exists:false, src});
        img.src = src + `?v=${Date.now().toString(36)}`;
      });
    }
    (async function loadImages(){
      const found = [];
      const firstOk = await probe(okName(1));
      if (firstOk.exists){
        found.push(firstOk.src);
        for (let i=2; i<=MAX_TRY; i++){
          const r = await probe(okName(i)); if (!r.exists) break; found.push(r.src);
        }
      } else {
        const firstTypo = await probe(typoName(1));
        if (firstTypo.exists){
          found.push(firstTypo.src);
          for (let i=2; i<=MAX_TRY; i++){
            const r = await probe(typoName(i)); if (!r.exists) break; found.push(r.src);
          }
        }
      }
      if (found.length === 0){
        const empty = document.createElement('div');
        empty.className = 'carousel-empty';
        empty.textContent = 'No se encontraron imágenes miniaturaN.jpg en la carpeta.';
        track.appendChild(empty);
        if (prev) prev.style.display='none';
        if (next) next.style.display='none';
        if (typeof fitLegal === 'function') setTimeout(fitLegal, 0);
        return;
      }
      const items = found.map((src, idx) => {
        const item = document.createElement('div');
        item.className = 'carousel-item' + (idx===0 ? ' is-active' : '');
        item.setAttribute('role','listitem');
        item.style.setProperty('--slide-img', `url("${src}")`);
        const img = document.createElement('img');
        img.loading = 'lazy'; img.decoding = 'async'; img.alt = `Imagen ${idx+1}`; img.src = src;
        item.appendChild(img); track.appendChild(item);
        return item;
      });
      let current = 0, isAnimating = false;
      function armTransitionUnlock(nextItem){
        const onEnd = (ev)=>{
          if (ev.propertyName === 'opacity'
           || ev.propertyName === 'transform'
           || ev.propertyName === 'filter'){
            nextItem.removeEventListener('transitionend', onEnd);
            isAnimating = false;
          }
        };
        nextItem.addEventListener('transitionend', onEnd);
        setTimeout(()=>{ isAnimating = false; }, 900);
      }
      function show(index){
        const total = items.length; if (total < 2 || isAnimating) return;
        const nextIndex = (index + total) % total; if (nextIndex === current) return;
        const curItem = items[current]; const nextItem = items[nextIndex];
        isAnimating = true; nextItem.classList.add('is-active'); armTransitionUnlock(nextItem);
        curItem.classList.remove('is-active'); current = nextIndex;
      }
      const goPrev = () => show(current - 1);
      const goNext = () => show(current + 1);
      if (items.length < 2){ if (prev) prev.style.display='none'; if (next) next.style.display='none'; }
      else { prev?.addEventListener('click', goPrev); next?.addEventListener('click', goNext); }
      track.setAttribute('tabindex','0');
      track.addEventListener('keydown', (ev)=>{ if (ev.key==='ArrowLeft') goPrev(); if (ev.key==='ArrowRight') goNext(); });
      // Swipe
      let startX=null, startY=null;
      track.addEventListener('touchstart', (e)=>{ const t=e.touches?.[0]; if(!t) return; startX=t.clientX; startY=t.clientY; }, {passive:true});
      track.addEventListener('touchend', (e)=>{ const t=e.changedTouches?.[0]; if(!t||startX===null||startY===null) return;
        const dx=t.clientX-startX, dy=t.clientY-startY;
        if (Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>30){ if (dx>0) goPrev(); else goNext(); }
        startX=startY=null;
      }, {passive:true});
      // Autoplay
      let autoplayId = null;
      const startAutoplay = () =>{ if (autoplayId || items.length<2) return; autoplayId = setInterval(goNext, AUTOPLAY_MS); };
      const stopAutoplay = () =>{ if (!autoplayId) return; clearInterval(autoplayId); autoplayId=null; };
      startAutoplay();
      document.addEventListener('visibilitychange', () =>{ if (document.hidden) stopAutoplay(); else startAutoplay(); });
      if (typeof fitLegal === 'function') setTimeout(fitLegal, 0);
    })();
  })();

  /* ========== Cerrar sesión ========== */
  (function(){
    document.getElementById('btnLogout')?.addEventListener('click', () => {
      try {
        sessionStorage.removeItem('auth_ok');
        sessionStorage.removeItem('auth_user');
        sessionStorage.removeItem('auth_role');
        sessionStorage.removeItem('welcome_shown');
        // Limpiar el módulo recordado para que siempre pregunte al volver
        sessionStorage.removeItem('last_module');
      } catch(e){}
      window.location.replace('login.html');
    });
  })();

  /* ========== Bienvenida (1 vez por sesión) ========== */
  (function(){
    const backdrop = document.getElementById('welcomeBackdrop');
    const nameEl = document.getElementById('welcomeUser');
    const btnGo = document.getElementById('welcomeContinue');
    if (!backdrop) return;
    const isAuth = !!sessionStorage.getItem('auth_ok');
    const already = sessionStorage.getItem('welcome_shown') === '1';
    if (isAuth && !already) {
      const user = (sessionStorage.getItem('auth_user') || 'usuario').trim();
      if (nameEl) nameEl.textContent = user;
      function closeWelcome(){
        backdrop.classList.remove('open');
        backdrop.setAttribute('aria-hidden','true');
        sessionStorage.setItem('welcome_shown','1');
      }
      // Abrir
      backdrop.classList.add('open');
      backdrop.removeAttribute('aria-hidden');
      btnGo?.addEventListener('click', closeWelcome);
      backdrop.addEventListener('click', (ev)=>{ if (ev.target === backdrop) closeWelcome(); });
      document.addEventListener('keydown', (ev)=>{ if (backdrop.classList.contains('open') && ev.key === 'Escape') closeWelcome(); });
    }
  })();
  </script>
