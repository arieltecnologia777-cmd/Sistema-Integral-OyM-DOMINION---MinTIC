<script>
/* ======= Interacción del filtro Regional (CONTROLADO POR EL PADRE) ======= */
const btnRegional = document.getElementById('btnRegional');
const menuRegional = document.getElementById('menuRegional');
const lblRegional = document.getElementById('lblRegional');
const regionalBox = document.getElementById('regionalBox');

function updateRegionalLabel(){
  if(lblRegional){ lblRegional.textContent = `Regional: ${regionalActual}`; }
}
function buildRegionalMenu(){
  // En modo controlado por el padre, NO mostramos opciones locales.
  if(!menuRegional) return;
  if(controlledByParent){
    menuRegional.innerHTML = '';
    menuRegional.classList.remove('show');
    btnRegional.setAttribute('aria-disabled','true');
    btnRegional.setAttribute('aria-expanded','false');
    return;
  }
  // Si NO está controlado por el padre (uso standalone), se puede usar el menú local.
  menuRegional.innerHTML = '';
  const bAll = document.createElement('button');
  bAll.type='button';
  bAll.setAttribute('role','option');
  bAll.textContent = 'Todas';
  bAll.onclick = ()=>{ regionalActual='Todas'; closeRegionalMenu(); updateRegionalLabel(); aplicarBusquedaYFiltro(); };
  menuRegional.appendChild(bAll);

  if(regionalesDisponibles.length){
    const sep = document.createElement('div'); sep.className='sep'; menuRegional.appendChild(sep);
  }
  for(const r of regionalesDisponibles){
    const b = document.createElement('button');
    b.type='button'; b.setAttribute('role','option');
    b.textContent = r;
    b.onclick = ()=>{ regionalActual=r; closeRegionalMenu(); updateRegionalLabel(); aplicarBusquedaYFiltro(); };
    menuRegional.appendChild(b);
  }
}
function openRegionalMenu(){
  if(!menuRegional || controlledByParent) return;
  menuRegional.classList.add('show');
  btnRegional.setAttribute('aria-expanded','true');
}
function closeRegionalMenu(){
  if(!menuRegional) return;
  menuRegional.classList.remove('show');
  btnRegional.setAttribute('aria-expanded','false');
}
btnRegional?.addEventListener('click', (e)=>{
  e.preventDefault(); e.stopPropagation();
  if(controlledByParent){
    // Enviamos al padre la intención de abrir/cambiar filtro
    try{ window.parent?.postMessage({ type:'exclusiones:open-filter', region: regionalActual }, '*'); }catch(_){}
    return;
  }
  if(menuRegional.classList.contains('show')) closeRegionalMenu(); else openRegionalMenu();
});
document.addEventListener('click', (e)=>{
  if(!controlledByParent){
    if(!regionalBox.contains(e.target)) closeRegionalMenu();
  }
});
document.addEventListener('keydown', (e)=>{
  if(e.key==='Escape') closeRegionalMenu();
});

/* ======= Panel de colores (sin cambios funcionales) ======= */
const paletteFab = document.getElementById('paletteFab');
const palette = document.getElementById('palette');
const colorHead = document.getElementById('colorHead');
const colorDom = document.getElementById('colorDom');
const colorLine = document.getElementById('colorLine');
const colorPill = document.getElementById('colorPill');

function getCSSVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
function setCSSVar(name, val){ document.documentElement.style.setProperty(name, val); }
function savePalette(){
  const payload = { head:getCSSVar('--head'), dom:getCSSVar('--dom-blue'), line:getCSSVar('--line'), pill:getCSSVar('--pill') };
  localStorage.setItem('palette_exclusiones', JSON.stringify(payload));
}
function loadPalette(){
  try{
    const raw = localStorage.getItem('palette_exclusiones');
    if(!raw) return;
    const p = JSON.parse(raw);
    if(p.head) setCSSVar('--head', p.head);
    if(p.dom) setCSSVar('--dom-blue', p.dom);
    if(p.line) setCSSVar('--line', p.line);
    if(p.pill) setCSSVar('--pill', p.pill);
  }catch(e){ /* no-op */ }
}
function syncInputsFromVars(){
  const vHead = getCSSVar('--head') || '#ffffff';
  const vDom  = getCSSVar('--dom-blue') || '#0e4aa8';
  const vLine = getCSSVar('--line') || '#e4ebf6';
  const vPill = getCSSVar('--pill') || '#cfe0ff';
  if(colorHead) colorHead.value = vHead.startsWith('#') ? vHead : '#ffffff';
  if(colorDom)  colorDom.value  = vDom.startsWith('#') ? vDom : '#0e4aa8';
  if(colorLine) colorLine.value = vLine.startsWith('#') ? vLine : '#e4ebf6';
  if(colorPill) colorPill.value = vPill.startsWith('#') ? vPill : '#cfe0ff';
}
function openPalette(){ if(palette){ palette.classList.add('show'); palette.setAttribute('aria-hidden','false'); syncInputsFromVars(); } }
function closePalette(){ if(palette){ palette.classList.remove('show'); palette.setAttribute('aria-hidden','true'); } }

if(paletteFab){
  paletteFab.addEventListener('click', () => { if(palette.classList.contains('show')) closePalette(); else openPalette(); });
  document.getElementById('btnClosePalette')?.addEventListener('click', closePalette);
  document.getElementById('btnResetPalette')?.addEventListener('click', ()=>{
    setCSSVar('--head', '#ffffff');
    setCSSVar('--dom-blue', '#0e4aa8');
    setCSSVar('--line', '#e4ebf6');
    setCSSVar('--pill', '#cfe0ff');
    savePalette(); syncInputsFromVars();
  });
  colorHead?.addEventListener('input', e => { setCSSVar('--head', e.target.value); savePalette(); });
  colorDom ?.addEventListener('input', e => { setCSSVar('--dom-blue', e.target.value); savePalette(); });
  colorLine?.addEventListener('input', e => { setCSSVar('--line', e.target.value); savePalette(); });
  colorPill?.addEventListener('input', e => { setCSSVar('--pill', e.target.value); savePalette(); });
}

/* ======= Handshake con la página padre (postMessage) ======= */
const isEmbedded = (()=>{ try{ return window.self !== window.top; }catch(e){ return true; } })();
const ALLOWED_PARENTS = []; // opcional: agrega orígenes si quieres validar event.origin
function allowedOrigin(origin){
  if(!ALLOWED_PARENTS.length) return true; // acepta todos si no configuras
  return ALLOWED_PARENTS.includes(origin);
}
// Aplica el scope recibido del padre
function applyScope({region, role, project} = {}){
  if(typeof project === 'string'){ setProjectScope(project); }
  if(typeof role === 'string'){ currentRole = role; }
  if(typeof region === 'string' && region.trim()){
    regionalActual = region.trim();
    updateRegionalLabel();
    aplicarBusquedaYFiltro();
  }else{
    // si el padre no manda aún, mantenemos 'Todas' (admin) o lo que toque después
    updateRegionalLabel();
  }
  // Visual: si está controlado, deshabilita el menú local
  buildRegionalMenu();
}
// Mensajes entrantes del padre
window.addEventListener('message', (event)=>{
  try{
    if(!allowedOrigin(event.origin)) return;
    const data = event.data;
    if(!data || typeof data !== 'object') return;
    switch(data.type){
      case 'exclusiones:set-scope':
        applyScope(data.payload || data);
        break;
      case 'exclusiones:update-region':
        if(typeof data.region === 'string'){ applyScope({ region: data.region }); }
        break;
      case 'exclusiones:update-project':
        if(typeof data.project === 'string'){ applyScope({ project: data.project }); }
        break;
      case 'exclusiones:request-refresh':
        cargarDesdeServidor();
        break;
    }
  }catch(e){ /* no-op */ }
});

// Arranque y handshake
function start(){
  loadPalette();
  // Detecta si está embebido => control por el padre
  controlledByParent = isEmbedded;
  // Etiqueta inicial
  updateRegionalLabel();
  buildRegionalMenu();
  // Handshake hacia el padre
  if(controlledByParent){
    try{
      window.parent?.postMessage({
        type: 'exclusiones:child-ready',
        wants: ['region','role','project'],
        build: buildMeta || 'n/a',
        projectScope
      }, '*');
    }catch(e){ /* no-op */ }
  }
  // Carga inicial de datos
  cargarDesdeServidor();
}
start();
</script>
</body>
</html>
