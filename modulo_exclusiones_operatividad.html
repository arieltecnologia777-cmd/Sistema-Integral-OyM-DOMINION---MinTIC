<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Módulo de exclusiones (hijo)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- (Opcional) Fluent UI MDL2 icons para consistencia visual -->
<link rel="stylesheet" href="https://res.cdn.office.net/files/fabric-cdn-prod_20240201.001/assets/icons/fabric-icons.css">

<!-- SheetJS para exportar (misma versión del admin) -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
  :root{
    --ink:#0e2040; --muted:#6b7893; --accent:#0e4aa8; --ok:#107c10; --err:#991b1b;
    --bg:#f6f9ff; --card:#ffffff; --b:#dbe6ff; --rad:14px;
  }
  html,body{height:100%}
  body{
    margin:0; font-family:"Segoe UI",system-ui,Roboto,Arial,sans-serif; color:#1a2333;
    background:
      radial-gradient(1200px 600px at 80% -10%, #eaf1ff 0%, rgba(234,241,255,0) 60%),
      linear-gradient(180deg,#eef4ff,#ffffff);
    display:flex; flex-direction:column; min-height:100vh;
  }
  .wrap{ width:min(1200px, 96%); margin:16px auto 28px; }
  .head{
    background:rgba(255,255,255,.7); border:1px solid var(--b); border-radius:18px;
    padding:12px 14px; display:flex; gap:12px; align-items:center; backdrop-filter: blur(6px);
  }
  .badge{
    padding:6px 10px; border-radius:999px; background:#eef3ff; border:1px solid var(--b);
    color:#0e3a82; font-weight:700; font-size:12px;
  }
  .title{ margin:0; font-size:20px; font-weight:800; color:var(--ink) }
  .sub{ margin:2px 0 0; color:#4e5d78; font-size:13px }
  .actions{ display:flex; gap:8px; flex-wrap:wrap; margin:12px 0 }
  .btn{
    display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border-radius:999px;
    border:1px solid var(--b); background:#fff; color:#0e3a82; font-weight:600; cursor:pointer;
    box-shadow:0 6px 16px rgba(20, 40, 90, .08);
  }
  .btn.primary{ background:var(--accent); border-color:var(--accent); color:#fff }
  .btn:disabled{ opacity:.55; cursor:not-allowed; box-shadow:none }
  .grid{
    display:grid; grid-template-columns: 1.2fr 2fr; gap:14px; margin-top:14px;
  }
  .card{
    background:var(--card); border:1px solid var(--b); border-radius:var(--rad);
    padding:12px 12px; box-shadow:0 10px 22px rgba(14,42,94,.08);
  }
  .card h3{ margin:0 0 8px; font-size:16px; font-weight:800; color:var(--ink) }
  .row{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin:8px 0 }
  .row .col{ display:flex; flex-direction:column; gap:6px }
  label{ font-size:12px; color:#334; font-weight:700 }
  input[type="text"], input[type="date"], select, textarea{
    padding:8px 10px; border-radius:10px; border:1px solid var(--b); background:#fff;
    font-size:14px; outline:none;
  }
  textarea{ min-height:76px; resize:vertical }
  .state{
    display:none; margin:10px 0 0; padding:10px 12px; border-radius:12px; background:#eef3ff;
    border:1px solid var(--b); color:#0e3a82; font-size:13px;
  }
  .state.show{ display:block }
  .state.err{ background:#fee2e2; border-color:#fecaca; color:var(--err) }

  .tool{ display:flex; gap:8px; align-items:center; margin:8px 0 }
  .tool input{ max-width:220px }
  .table-wrap{ overflow:auto; border:1px solid var(--b); border-radius:12px }
  table{ border-collapse:collapse; width:100%; background:#fff }
  th, td{ padding:8px 10px; border-bottom:1px solid #eef2ff; font-size:13px; text-align:left; white-space:nowrap }
  th{ background:#f4f7ff; color:#223; font-weight:800; position:sticky; top:0; z-index:1 }
  tr:hover td{ background:#fafcff }
  .muted{ color:var(--muted) }
  .ok{ color:var(--ok) } .errtxt{ color:var(--err) }

  @media (max-width: 980px){
    .grid{ grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <!-- Encabezado -->
    <div class="head">
      <div class="badge" id="modBadge">—</div>
      <div style="flex:1">
        <h1 class="title">Módulo de exclusiones (hijo)</h1>
        <p class="sub">Carga/visualiza registros según el módulo activo del admin.</p>
      </div>
      <div class="actions">
        <button id="btnRefresh" class="btn" title="Recargar datos"><i class="ms-Icon ms-Icon--Refresh"></i> Recargar</button>
        <button id="btnExport" class="btn" title="Exportar datos a Excel"><i class="ms-Icon ms-Icon--ExcelDocument"></i> Exportar</button>
      </div>
    </div>

    <div class="grid">
      <!-- Formulario de gestión -->
      <section class="card">
        <h3>Registrar/actualizar exclusión</h3>
        <div class="row">
          <div class="col">
            <label for="fFecha">Fecha</label>
            <input type="date" id="fFecha" />
          </div>
          <div class="col">
            <label for="fOT">OT</label>
            <input type="text" id="fOT" placeholder="Ej: 123456" />
          </div>
        </div>

        <div class="row">
          <div class="col">
            <label for="fCausa">Causa de exclusión</label>
            <textarea id="fCausa" placeholder="Justificación / motivo"></textarea>
          </div>
          <div class="col">
            <label for="fRegional">Regional</label>
            <input type="text" id="fRegional" placeholder="Ej: Costa, Oriente..." />
          </div>
        </div>

        <div class="actions">
          <button id="btnGuardar" class="btn primary"><i class="ms-Icon ms-Icon--Save"></i> Guardar</button>
          <button id="btnLimpiar" class="btn" title="Limpiar formulario"><i class="ms-Icon ms-Icon--EraseTool"></i> Limpiar</button>
        </div>

        <div id="estadoForm" class="state" role="status" aria-live="polite"></div>
      </section>

      <!-- Tabla / listado -->
      <section class="card">
        <h3>Datos del módulo <span class="muted" id="modText">—</span></h3>

        <div class="tool">
          <label class="muted">Filtros:</label>
          <input id="fltOT" type="text" placeholder="Filtrar por OT..." />
          <input id="fltRegional" type="text" placeholder="Filtrar por regional..." />
          <button id="btnClearFilters" class="btn"><i class="ms-Icon ms-Icon--ClearFilter"></i> Limpiar filtros</button>
        </div>

        <div class="table-wrap">
          <table id="tbl">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>OT</th>
                <th>Causa de exclusión</th>
                <th>Regional</th>
              </tr>
            </thead>
            <tbody id="tbody">
              <!-- filas -->
            </tbody>
          </table>
        </div>

        <div id="estadoTabla" class="state" role="status" aria-live="polite"></div>
      </section>
    </div>
  </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
/* ============================================================
   CONFIG BACKEND — multi-módulo (auto-detección)
   ============================================================ */
const API_BASE = 'https://exclusiones-worker.modulo-de-exclusiones.workers.dev';
const BACKENDS = {
  operatividad: `${API_BASE}/p1`,
  backlog:      `${API_BASE}/p2`,
  sla:          `${API_BASE}/p3`,
};
const LABELS = {
  operatividad: 'Exclusiones de operatividad',
  backlog:      'Exclusiones indicador backlog',
  sla:          'Exclusiones SLA'
};

// 1) ?m=operatividad|backlog|sla  2) sessionStorage.ex_mod  3) fallback 'operatividad'
function detectModule(){
  const q = new URLSearchParams(location.search).get('m');
  const cand = (q || '').trim().toLowerCase();
  if (cand === 'operatividad' || cand === 'backlog' || cand === 'sla') return cand;
  try{
    const s = (sessionStorage.getItem('ex_mod') || '').trim().toLowerCase();
    if (s === 'operatividad' || s === 'backlog' || s === 'sla') return s;
  }catch{}
  return 'operatividad';
}
let CURRENT_MODULE = detectModule();
let API = (BACKENDS[CURRENT_MODULE] || BACKENDS.operatividad).replace(/\/+$/, '');

function setModule(mod){
  const m = (mod || '').toLowerCase();
  if (!BACKENDS[m]) return;
  CURRENT_MODULE = m;
  API = BACKENDS[m].replace(/\/+$/,'');
  paintModule();
}

// Util
const $ = s => document.querySelector(s);
function show(el, txt='', isErr=false){
  el.textContent = txt;
  el.classList.toggle('err', !!isErr);
  el.classList.add('show');
}
function hide(el){
  el.classList.remove('show'); el.classList.remove('err'); el.textContent='';
}
// dd/mm/yyyy (para enviar estable al backend)
function toDMYFromInput(dateValue){
  if(!dateValue) return '';
  // dateValue viene como yyyy-mm-dd de <input type="date">
  const m = String(dateValue).match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m) return String(dateValue);
  return `${m[3]}/${m[2]}/${m[1]}`;
}

/* ============================================================
   FETCH helper (CORS habilitado en el Worker)
   ============================================================ */
async function fetchAPI(path, opts = {}){
  const url = `${API}${path.startsWith('/') ? path : '/'+path}`;
  const res = await fetch(url, { mode:'cors', ...opts });
  let json = null;
  try { json = await res.clone().json(); } catch {}
  if (!res.ok || (json && json.ok === false)) {
    const msg = json?.error || `HTTP ${res.status}`;
    throw new Error(msg);
  }
  return json ?? {};
}

/* ============================================================
   RENDER & STATE
   ============================================================ */
let RAW_DATA = []; // origen
let VIEW = [];     // filtrada/ordenada para la tabla

function paintModule(){
  const badge = $('#modBadge');
  const txt = $('#modText');
  if(badge){ badge.textContent = LABELS[CURRENT_MODULE] || CURRENT_MODULE; }
  if(txt){ txt.textContent = LABELS[CURRENT_MODULE] || CURRENT_MODULE; }
}
paintModule();

function renderTable(){
  const tb = $('#tbody');
  tb.innerHTML = '';
  for(const r of VIEW){
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${r.fecha || ''}</td>
      <td>${r.ot || ''}</td>
      <td>${r.causa || ''}</td>
      <td>${r.regional || ''}</td>`;
    tb.appendChild(tr);
  }
  const est = $('#estadoTabla');
  if(VIEW.length === 0){
    show(est, 'No hay filas para mostrar.');
  }else{
    hide(est);
  }
}

function applyFilters(){
  const qOT = ($('#fltOT')?.value || '').trim().toLowerCase();
  const qReg = ($('#fltRegional')?.value || '').trim().toLowerCase();
  VIEW = RAW_DATA.filter(r => {
    const okOT = qOT ? String(r.ot||'').toLowerCase().includes(qOT) : true;
    const okRg = qReg ? String(r.regional||'').toLowerCase().includes(qReg) : true;
    return okOT && okRg;
  });
  renderTable();
}

/* ============================================================
   ACCIONES
   ============================================================ */
async function cargarDatos(){
  const info = $('#estadoTabla');
  try{
    show(info, 'Cargando…');
    const j = await fetchAPI('/api/datos', { method:'GET', headers:{ 'Accept':'application/json' } });
    RAW_DATA = Array.isArray(j?.data) ? j.data : [];
    // orden: fecha desc (si se puede)
    VIEW = [...RAW_DATA];
    renderTable();
    show(info, `Cargado. Filas: ${VIEW.length}.`); setTimeout(()=>hide(info), 800);
  }catch(err){
    console.error(err);
    show(info, 'Error al cargar: ' + err.message, true);
  }
}

async function exportarDatos(){
  const info = $('#estadoTabla');
  try{
    show(info, 'Exportando…');
    const j = await fetchAPI('/api/aoa', { method:'GET', headers:{ 'Accept':'application/json' } });
    const aoa = Array.isArray(j?.aoa) ? j.aoa : [];
    if(!aoa.length){ show(info, 'No hay datos para exportar.'); return; }
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    XLSX.utils.book_append_sheet(wb, ws, (LABELS[CURRENT_MODULE]||CURRENT_MODULE).slice(0,26) || 'Exclusiones');
    const nombre = `exclusiones_${CURRENT_MODULE}_${new Date().toISOString().slice(0,10)}.xlsx`;
    XLSX.writeFile(wb, nombre);
    show(info, 'Exportación completada.'); setTimeout(()=>hide(info), 800);
  }catch(err){
    console.error(err);
    show(info, 'Error al exportar: ' + err.message, true);
  }
}

async function guardarGestion(){
  const estado = $('#estadoForm');
  try{
    const fFecha = $('#fFecha').value;
    const fOT = ($('#fOT').value || '').trim();
    const fCausa = ($('#fCausa').value || '').trim();
    const fRegional = ($('#fRegional').value || '').trim();

    if(!fOT){ show(estado, 'La OT es obligatoria.', true); return; }
    if(!fFecha){ show(estado, 'La fecha es obligatoria.', true); return; }

    const payload = {
      ot: fOT,
      registros: [{
        fecha: toDMYFromInput(fFecha),   // -> dd/mm/yyyy (el Worker normaliza robusto también)
        causa: fCausa,
        regional: fRegional
      }]
    };

    show(estado, 'Guardando…');
    const res = await fetchAPI('/api/guardarOT', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Accept':'application/json' },
      body: JSON.stringify(payload)
    });
    if(!res?.ok){ throw new Error('No se pudo guardar'); }

    show(estado, 'Guardado correctamente.', false);
    // refrescar tabla
    await cargarDatos();
  }catch(err){
    console.error(err);
    show(estado, 'Error al guardar: ' + err.message, true);
  }
}

function limpiarForm(){
  $('#fFecha').value = '';
  $('#fOT').value = '';
  $('#fCausa').value = '';
  $('#fRegional').value = '';
  hide($('#estadoForm'));
}

/* ============================================================
   EVENTOS
   ============================================================ */
$('#btnRefresh')?.addEventListener('click', cargarDatos);
$('#btnExport')?.addEventListener('click', exportarDatos);
$('#btnGuardar')?.addEventListener('click', guardarGestion);
$('#btnLimpiar')?.addEventListener('click', limpiarForm);
$('#fltOT')?.addEventListener('input', applyFilters);
$('#fltRegional')?.addEventListener('input', applyFilters);
$('#btnClearFilters')?.addEventListener('click', () => {
  $('#fltOT').value = ''; $('#fltRegional').value = ''; applyFilters();
});

// Re-sincroniza con el admin si cambió de módulo recientemente
try{
  const last = (sessionStorage.getItem('ex_mod')||'').trim().toLowerCase();
  if (last && last !== CURRENT_MODULE && BACKENDS[last]) setModule(last);
}catch{}

/* ============================================================
   INIT
   ============================================================ */
cargarDatos();

}); // DOMContentLoaded
</script>
</body>
</html>
